<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Yatra — Córtex Virtual</title>
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Inter:wght@400;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:       #0d0d10;
      --surface:  #16161a;
      --border:   #2a2a32;
      --accent:   #7c3aed;
      --accent2:  #a78bfa;
      --text:     #e8e8f0;
      --muted:    #6b6b80;
      --user-bg:  #7c3aed;
      --ia-bg:    #1e1e26;
      --radius:   14px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100dvh;
      display: flex;
      flex-direction: column;
    }

    /* ── HEADER ─────────────────────────── */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 20px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      gap: 12px;
      flex-shrink: 0;
    }

      <div id="btn-login" style="margin: 10px; cursor: pointer; color: var(--accent);">
          <div class="g_id_signin" data-type="standard" data-shape="pill"></div>
      </div>

    .header-left { display: flex; align-items: center; gap: 12px; }

    .oled-preview {
      width: 52px; height: 28px;
      background: #000;
      border: 1.5px solid var(--border);
      border-radius: 4px;
      display: flex; align-items: center; justify-content: center;
      font-family: 'Share Tech Mono', monospace;
      font-size: 11px;
      color: #fff;
      letter-spacing: 2px;
      transition: color 0.4s;
    }

    .titulo    { font-size: 15px; font-weight: 600; letter-spacing: .5px; }
    .subtitulo { font-size: 11px; color: var(--muted); font-family: 'Share Tech Mono', monospace; }

    #badge-humor {
      padding: 6px 14px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 600;
      font-family: 'Share Tech Mono', monospace;
      background: var(--border);
      color: var(--text);
      transition: all .35s ease;
      white-space: nowrap;
    }

    /* ── BARRA DE SENSORES ───────────────── */
    #barra-sensores {
      display: flex;
      gap: 18px;
      padding: 7px 20px;
      background: #111115;
      border-bottom: 1px solid var(--border);
      font-family: 'Share Tech Mono', monospace;
      font-size: 11px;
      color: var(--muted);
      flex-shrink: 0;
      overflow-x: auto;
    }
    #barra-sensores span { white-space: nowrap; }
    #barra-sensores b    { color: var(--accent2); }

    /* ── BARRA DE ESTADOS INTERNOS ───────── */
    #barra-estados {
      display: flex;
      gap: 14px;
      padding: 7px 20px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      font-size: 11px;
      color: var(--muted);
      flex-shrink: 0;
      align-items: center;
    }
    .estado-item { display: flex; align-items: center; gap: 6px; }
    .barra-mini {
      width: 60px; height: 5px;
      background: var(--border);
      border-radius: 3px;
      overflow: hidden;
    }
    .barra-mini-fill { height: 100%; border-radius: 3px; transition: width .5s; }

    /* ── CHAT ────────────────────────────── */
    #chat {
      flex: 1;
      overflow-y: auto;
      padding: 20px 16px;
      display: flex;
      flex-direction: column;
      gap: 14px;
      scroll-behavior: smooth;
    }

    .msg {
      max-width: 72%;
      padding: 11px 16px;
      border-radius: var(--radius);
      line-height: 1.55;
      font-size: 14.5px;
      animation: fadeUp .2s ease;
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: translateY(0);   }
    }

    .msg.user {
      background: var(--user-bg);
      align-self: flex-end;
      border-bottom-right-radius: 3px;
    }
    .msg.ia {
      background: var(--ia-bg);
      align-self: flex-start;
      border-bottom-left-radius: 3px;
      border: 1px solid var(--border);
    }
    .msg.typing { opacity: .6; font-style: italic; }

    /* ── INPUT ───────────────────────────── */
    #input-area {
      display: flex;
      gap: 10px;
      padding: 14px 16px;
      background: var(--surface);
      border-top: 1px solid var(--border);
      flex-shrink: 0;
    }

    #campo {
      flex: 1;
      padding: 12px 16px;
      background: #111115;
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--text);
      font-size: 14px;
      font-family: 'Inter', sans-serif;
      outline: none;
      transition: border-color .2s;
    }
    #campo:focus { border-color: var(--accent); }

    #btn-enviar {
      padding: 12px 22px;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: background .2s, transform .1s;
    }
    #btn-enviar:hover  { background: #6d28d9; }
    #btn-enviar:active { transform: scale(.97); }

    #info-amizade {
      font-size: 11px;
      color: var(--muted);
      padding: 0 20px 8px;
      font-family: 'Share Tech Mono', monospace;
      flex-shrink: 0;
    }

    /* ── SCROLLBAR ───────────────────────── */
    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }
  </style>
</head>
<body>

<!-- ── HEADER ──────────────────────────────────────────── -->
<header>
  <div class="header-left">
    <div class="oled-preview" id="oled-face">o o</div>
    <div>
      <div class="titulo">Yatra</div>
      <div class="subtitulo" id="sub-idade">carregando...</div>
    </div>
  </div>
  <div id="badge-humor">😐 NEUTRO</div>
</header>

<!-- ── BARRA DE SENSORES ───────────────────────────────── -->
<div id="barra-sensores">
  <span>🌡️ Temp: <b id="s-temp">--</b>°C</span>
  <span>💧 Umid: <b id="s-umid">--</b>%</span>
  <span>📏 Dist: <b id="s-dist">--</b>cm</span>
  <span id="lux-wrap">💡 Luz: <b id="s-lux">--</b>%</span>
  <span id="som-wrap">🔊 <b id="s-som">--</b></span>
  <span id="mov-wrap">📳 <b id="s-mov">--</b></span>
  <span id="esp-status">🔴 ESP32 offline</span>
</div>

<!-- ── BARRA DE ESTADOS INTERNOS ───────────────────────── -->
<div id="barra-estados">
  <div class="estado-item">
    ⚡ Energia
    <div class="barra-mini">
      <div class="barra-mini-fill" id="b-energia" style="background:#a78bfa;width:100%"></div>
    </div>
  </div>
  <div class="estado-item">
    🔍 Curiosidade
    <div class="barra-mini">
      <div class="barra-mini-fill" id="b-curiosidade" style="background:#34d399;width:70%"></div>
    </div>
  </div>
  <div class="estado-item">
    😰 Medo
    <div class="barra-mini">
      <div class="barra-mini-fill" id="b-medo" style="background:#f87171;width:10%"></div>
    </div>
  </div>
  <div class="estado-item" style="margin-left:auto">
    🤝 <span id="nivel-amizade">Desconhecido</span>
  </div>
</div>

<!-- ── CHAT ────────────────────────────────────────────── -->
<div id="chat"></div>
<div id="info-amizade"></div>

<!-- ── INPUT ───────────────────────────────────────────── -->
<div id="input-area">
  <input id="campo" type="text" placeholder="Fale com a Yatra..."
         onkeydown="if(event.key==='Enter') enviar()">
  <button id="btn-enviar" onclick="enviar()">Enviar</button>
</div>

<script>
  /* ─────────────────────────────────────────────────────
     CONSTANTES
  ───────────────────────────────────────────────────── */
  const USER_ID = "local_web_user";
  const chat    = document.getElementById('chat');

  /* Mapa de humores → visual */
  const HUMORES = {
    N: { emoji:'😐', label:'NEUTRO',    bg:'#2a2a32', cor:'#e8e8f0', face:'o o'  },
    A: { emoji:'😁', label:'ALEGRIA',   bg:'#166534', cor:'#bbf7d0', face:':D'   },
    R: { emoji:'😡', label:'RAIVA',     bg:'#7f1d1d', cor:'#fecaca', face:'>:c'  },
    T: { emoji:'😢', label:'TRISTEZA',  bg:'#1e3a5f', cor:'#bfdbfe', face:':c'   },
    C: { emoji:'🌀', label:'CONFUSA',   bg:'#3b0764', cor:'#e9d5ff', face:'OwO'  },
    M: { emoji:'😱', label:'MEDO',      bg:'#713f12', cor:'#fef08a', face:';w;'  },
    X: { emoji:'😬', label:'ANSIOSA',   bg:'#0c4a6e', cor:'#bae6fd', face:'o_o'  },
    E: { emoji:'🤩', label:'EMPOLGADA', bg:'#7c2d12', cor:'#fed7aa', face:'^w^'  },
    S: { emoji:'😴', label:'SONO',      bg:'#1e1b4b', cor:'#c7d2fe', face:'-w-'  },
  };

  /* ─────────────────────────────────────────────────────
     HELPERS DE UI
  ───────────────────────────────────────────────────── */
  function addMsg(texto, tipo) {
    const div = document.createElement('div');
    div.className = `msg ${tipo}`;
    div.textContent = texto;
    chat.appendChild(div);
    chat.scrollTop = chat.scrollHeight;
    return div;
  }

  function atualizarHumor(h) {
    const info  = HUMORES[h] || HUMORES['N'];
    const badge = document.getElementById('badge-humor');
    badge.textContent       = `${info.emoji} ${info.label}`;
    badge.style.background  = info.bg;
    badge.style.color       = info.cor;
    const oled = document.getElementById('oled-face');
    oled.textContent  = info.face;
    oled.style.color  = info.cor;
  }

  function atualizarEstados(e, c, m) {
    document.getElementById('b-energia').style.width     = (e ?? 100) + '%';
    document.getElementById('b-curiosidade').style.width = (c ?? 70)  + '%';
    document.getElementById('b-medo').style.width        = (m ?? 10)  + '%';
  }

  function atualizarSensores(dados) {
    if (!dados) return;

    /* Temperatura */
    if (dados.temp !== null && dados.temp !== undefined)
      document.getElementById('s-temp').textContent = Number(dados.temp).toFixed(1);

    /* Umidade */
    if (dados.umid !== null && dados.umid !== undefined)
      document.getElementById('s-umid').textContent = Math.round(dados.umid);

    /* Distância */
    if (dados.dist !== null && dados.dist !== undefined)
      document.getElementById('s-dist').textContent = Math.round(dados.dist);

    /* Luminosidade */
    if (dados.lux !== null && dados.lux !== undefined)
      document.getElementById('s-lux').textContent = dados.lux;

    /* Som */
    const somEl = document.getElementById('s-som');
    somEl.textContent  = dados.som ? 'som!' : 'silêncio';
    somEl.style.color  = dados.som ? '#f87171' : '';

    /* Movimento via MPU */
    const ax  = dados.ax || 0;
    const ay  = dados.ay || 0;
    const az  = dados.az || 0;
    const mag = Math.sqrt(ax*ax + ay*ay + az*az);
    document.getElementById('s-mov').textContent = mag > 1.2 ? 'movimento' : 'estática';

    /* Status do ESP32 */
    const statusEl = document.getElementById('esp-status');
    if (dados.online) {
      statusEl.textContent = '🟢 ESP32 online';
      statusEl.style.color = '#34d399';
    } else {
      statusEl.textContent = '🔴 ESP32 offline';
      statusEl.style.color = '#f87171';
    }
  }

  function atualizarAmizade(nivel, pontos, apelido) {
    document.getElementById('nivel-amizade').textContent = nivel || 'Desconhecido';
    document.getElementById('info-amizade').textContent =
      `👤 ${apelido || 'usuário'}  |  🤝 ${nivel || 'Desconhecido'} (${pontos || 0}/100 pts)`;
  }

  /* ─────────────────────────────────────────────────────
     ENVIAR MENSAGEM  →  POST /enviar
  ───────────────────────────────────────────────────── */
  async function enviar() {
    const campo = document.getElementById('campo');
    const texto = campo.value.trim();
    if (!texto) return;

    campo.value    = '';
    campo.disabled = true;
    document.getElementById('btn-enviar').disabled = true;

    addMsg(texto, 'user');
    const typing = addMsg('...', 'ia typing');

    try {
      const res = await fetch('/enviar', {
        method:  'POST',
        headers: { 'Content-Type': 'application/json' },
        body:    JSON.stringify({ mensagem: texto, user_id: USER_ID })
      });

      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const data = await res.json();

      typing.remove();
      addMsg(data.resposta, 'ia');
      atualizarHumor(data.humor);
      atualizarEstados(data.energia, data.curiosidade, data.medo);
      atualizarSensores(data.sensores);
      atualizarAmizade(data.nivel_amizade, data.pontos_amizade, data.apelido);

    } catch (err) {
      typing.textContent = '⚠️ Erro de conexão com a Yatra.';
      console.error('[Yatra] Erro ao enviar:', err);
    } finally {
      campo.disabled = false;
      document.getElementById('btn-enviar').disabled = false;
      campo.focus();
    }
  }

  /* ─────────────────────────────────────────────────────
     CARGA INICIAL  →  GET /status
  ───────────────────────────────────────────────────── */
  fetch('/status')
    .then(r => r.json())
    .then(d => {
      document.getElementById('sub-idade').textContent =
        `${d.idade_dias} dias de existência · ${d.mensagens_totais} msgs`;
      atualizarHumor(d.humor_atual);
      atualizarEstados(d.energia, d.curiosidade, d.medo);
      if (d.greeting) addMsg(d.greeting, 'ia');
      atualizarAmizade(d.nivel_amizade, d.pontos_amizade, d.apelido);
    })
    .catch(err => console.error('[Yatra] Erro ao carregar status:', err));

  /* ─────────────────────────────────────────────────────
     POLLING DE SENSORES  →  GET /sensores  (a cada 1s)
  ───────────────────────────────────────────────────── */
  setInterval(() => {
    fetch('/sensores')
      .then(r => r.json())
      .then(atualizarSensores)
      .catch(() => {}); /* silencia erros de rede no polling */
  }, 1000); /* 1 segundo */
</script>
</body>
</html>
